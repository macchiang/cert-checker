name: Publish Helm Chart (OCI)

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/charts/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Read chart version
        id: chart
        run: |
          VERSION=$(grep '^version:' deploy/charts/cert-checker/Chart.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package Helm chart
        run: helm package deploy/charts/cert-checker --destination /tmp/helm-charts

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/helm-charts/cert-checker-${{ steps.chart.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}

      - name: Logout from registry
        if: always()
        run: helm registry logout ghcr.io
